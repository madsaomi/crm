{% extends "base.html" %}
{% block title %}{{ 'Редактировать' if manager else 'Добавить' }} менеджера{% endblock %}
{% block content %}
<div class="page-header">
    <h1>
        <i class="bi bi-{{ 'pencil' if manager else 'person-plus' }} me-2" style="color: var(--accent);"></i>
        {{ 'Редактировать' if manager else 'Добавить' }} менеджера
    </h1>
</div>

<div class="card" style="max-width: 600px;">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Имя *</label>
                <input type="text" name="name" class="form-control" value="{{ manager.name if manager else '' }}" required>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-accent">
                    <i class="bi bi-check-lg me-1"></i> {{ 'Сохранить' if manager else 'Добавить' }}
                </button>
                <a href="{{ url_for('managers.list_managers') }}" class="btn btn-outline-light">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
