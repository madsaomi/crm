{% extends "base.html" %}
{% block title %}Менеджеры{% endblock %}
{% block content %}
<div class="page-header">
    <h1><i class="bi bi-briefcase me-2" style="color: var(--accent);"></i>Менеджеры</h1>
    <a href="{{ url_for('managers.create_manager') }}" class="btn btn-accent">
        <i class="bi bi-plus-lg me-1"></i> Добавить
    </a>
</div>

<div class="card">
    <div class="card-body p-0">
        <table class="table table-dark mb-0">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Имя</th>
                    <th>Студентов</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
            {% for manager in managers %}
                <tr>
                    <td>{{ loop.index }}</td>
                    <td>
                        <a href="{{ url_for('managers.view_manager', manager_id=manager.id) }}" style="color: var(--text-primary); text-decoration: none; font-weight: 500;">
                            {{ manager.name }}
                        </a>
                    </td>
                    <td><span class="badge badge-accent">{{ manager.students|length }}</span></td>
                    <td>
                        <a href="{{ url_for('managers.edit_manager', manager_id=manager.id) }}" class="btn btn-sm btn-outline-light">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form method="POST" action="{{ url_for('managers.delete_manager', manager_id=manager.id) }}" class="d-inline" onsubmit="return confirm('Удалить менеджера?');">
                            <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </form>
                    </td>
                </tr>
            {% else %}
                <tr><td colspan="4" class="text-center py-4" style="color: var(--text-secondary);">Нет менеджеров</td></tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
