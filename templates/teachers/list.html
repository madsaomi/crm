{% extends "base.html" %}
{% block title %}Преподаватели{% endblock %}
{% block content %}
<div class="page-header">
    <h1><i class="bi bi-person-badge me-2" style="color: var(--accent);"></i>Преподаватели</h1>
    <a href="{{ url_for('teachers.create_teacher') }}" class="btn btn-accent">
        <i class="bi bi-plus-lg me-1"></i> Добавить
    </a>
</div>

<div class="card">
    <div class="card-body p-0">
        <table class="table table-dark mb-0">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Имя</th>
                    <th>Групп</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
            {% for teacher in teachers %}
                <tr>
                    <td>{{ loop.index }}</td>
                    <td>
                        <a href="{{ url_for('teachers.view_teacher', teacher_id=teacher.id) }}" style="color: var(--text-primary); text-decoration: none; font-weight: 500;">
                            {{ teacher.name }}
                        </a>
                    </td>
                    <td><span class="badge badge-accent">{{ teacher.groups|length }}</span></td>
                    <td>
                        <a href="{{ url_for('teachers.edit_teacher', teacher_id=teacher.id) }}" class="btn btn-sm btn-outline-light">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form method="POST" action="{{ url_for('teachers.delete_teacher', teacher_id=teacher.id) }}" class="d-inline" onsubmit="return confirm('Удалить преподавателя?');">
                            <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </form>
                    </td>
                </tr>
            {% else %}
                <tr><td colspan="4" class="text-center py-4" style="color: var(--text-secondary);">Нет преподавателей</td></tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
