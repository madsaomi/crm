{% extends "base.html" %}
{% block title %}Добавить оплату{% endblock %}
{% block content %}
<div class="page-header">
    <h1>
        <i class="bi bi-credit-card me-2" style="color: var(--accent);"></i>Добавить оплату
    </h1>
</div>

<div class="card" style="max-width: 600px;">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Студент *</label>
                <select name="student_id" class="form-select" required>
                    <option value="">— Выберите студента —</option>
                    {% for s in students %}
                        <option value="{{ s.id }}" {% if preselected and preselected == s.id %}selected{% endif %}>{{ s.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Сумма (₸) *</label>
                    <input type="number" name="amount" class="form-control" step="0.01" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Дата</label>
                    <input type="date" name="date" class="form-control" value="{{ today if today else '' }}">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Описание</label>
                <input type="text" name="description" class="form-control" placeholder="Например: Оплата за март">
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-accent">
                    <i class="bi bi-check-lg me-1"></i> Добавить
                </button>
                <a href="{{ url_for('payments.list_payments') }}" class="btn btn-outline-light">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
